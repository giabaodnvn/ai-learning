services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/workspace
      - bundle_data:/usr/local/bundle
    working_dir: /workspace
    environment:
      APP_NAME: ${APP_NAME:-my_app}
      RAILS_ENV: development
      DB_HOST: db
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DATABASE_URL: mysql2://root:${DB_PASSWORD:-password}@db/${DB_NAME:-my_app_development}
      REDIS_URL: redis://redis:6379/0
    command: bash -lc "cd \"$APP_NAME\" && (bundle check || bundle install) && bin/rails db:prepare && bin/rails server -b 0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "${APP_PORT:-3003}:3000"
    tty: true
    stdin_open: true

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_DATABASE: ${DB_NAME:-my_app_development}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "--password=${DB_PASSWORD:-password}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "${REDIS_PORT:-6380}:6379"

  sidekiq:
    build:
      context: .
      dockerfile: docker/Dockerfile
    volumes:
      - .:/workspace
      - bundle_data:/usr/local/bundle
    working_dir: /workspace
    environment:
      APP_NAME: ${APP_NAME:-ai_learning}
      RAILS_ENV: development
      DB_HOST: db
      DB_USERNAME: root
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DATABASE_URL: mysql2://root:${DB_PASSWORD:-password}@db/${DB_NAME:-ai_learning_development}
      REDIS_URL: redis://redis:6379/0
    command: bash -lc "cd \"$APP_NAME\" && (bundle check || bundle install) && bundle exec sidekiq"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:${APP_PORT:-3003}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - app

volumes:
  bundle_data:
  mysql_data:
  frontend_node_modules:

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (Rails)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: ai_learning_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot --password=password"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
      redis:
        image: redis:7
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: ai_learning

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true
          working-directory: ai_learning

      - name: Lint (RuboCop)
        run: bundle exec rubocop --parallel

      - name: Security scan (Brakeman)
        run: bundle exec brakeman --no-pager

      - name: Run tests (RSpec)
        env:
          RAILS_ENV: test
          DATABASE_URL: mysql2://root:password@127.0.0.1:3306/ai_learning_test
          REDIS_URL: redis://localhost:6379/0
          DEVISE_JWT_SECRET_KEY: test_secret_key_for_ci_only
        run: |
          bundle exec rails db:schema:load
          bundle exec rspec

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000
          NEXTAUTH_SECRET: ci_nextauth_secret
          NEXTAUTH_URL: http://localhost:3001
